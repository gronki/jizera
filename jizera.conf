<VirtualHost *:80>
    ServerName jizera.example.com

    WSGIDaemonProcess jizera
    # user=apache group=apache threads=4
    WSGIScriptAlias / /var/www/jizera/jizera.wsgi

    <Directory /var/www/jizera>
        WSGIProcessGroup jizera
        WSGIApplicationGroup %{GLOBAL}
        Order deny,allow
        Allow from all
    </Directory>
</VirtualHost>
